{% extends "indexnav.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
                <!-- Display Django Messages -->
                {% if messages %}
                <div class="container mt-3">
                  {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="background-color: #f8d7da;">
                      {{ message }}
                      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                  {% endfor %}
                </div>
              {% endif %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <center><h2 class="form-title mb-0 text-light">Login</h2></center>
                </div>
                <div class="card-body">
                    <form method="POST" action="{% url 'userlog' %}">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary btn-block mt-3">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<br><br>
{% endblock %}
